openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Prototype Squad Portfolio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: files
    description: File upload and retrieval
  - name: team
    description: Team member management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List uploaded files, optionally filtered by section
      parameters:
        - name: section
          in: query
          required: false
          schema:
            type: string
          description: Filter by section/phase name
      responses:
        "200":
          description: List of uploaded files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedFile"

  /files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file metadata by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedFile"
        "404":
          description: Not found
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /files/sections:
    get:
      operationId: listSections
      tags: [files]
      summary: List all sections with file counts
      responses:
        "200":
          description: Section summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectionSummary"

  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List all team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member description
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}/photo:
    post:
      operationId: uploadTeamMemberPhoto
      tags: [team]
      summary: Upload a profile photo for a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated team member with photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "400":
          description: No file uploaded
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UploadedFile:
      type: object
      required: [id, filename, originalName, mimeType, section, fileSize, url, uploadedAt]
      properties:
        id:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        section:
          type: string
        fileSize:
          type: integer
        url:
          type: string
        uploadedAt:
          type: string

    SectionSummary:
      type: object
      required: [section, count]
      properties:
        section:
          type: string
        count:
          type: integer

    TeamMember:
      type: object
      required: [id, name, rollNumber, initials, description]
      properties:
        id:
          type: integer
        name:
          type: string
        rollNumber:
          type: string
        initials:
          type: string
        description:
          type: string
        photoUrl:
          type: string
          nullable: true

    TeamMemberUpdate:
      type: object
      properties:
        description:
          type: string
